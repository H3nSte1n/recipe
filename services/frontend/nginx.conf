server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container, same role the Vite dev
    # server's proxy played — the SPA only ever calls relative /api/v1/...
    # paths and expects something in front of it to route those to the
    # `app` service (see CLAUDE.md "Critical Conventions").
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: React Router handles client-side paths like /recipes/123
    # that don't correspond to real files, so unmatched requests must still
    # return index.html rather than nginx's default 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
