services:
  frontend:
    build: ./services/frontend
    # Host port stays 5173; the container now serves the production build
    # via nginx on its internal port 80 instead of the Vite dev server.
    ports:
      - "5173:80"
    depends_on:
      - app
    networks:
      app_net:
        ipv4_address: 172.30.0.10

  app:
    build: ./services/backend
    # No host port published: the frontend's nginx (172.30.0.10 on app_net)
    # is the only intended path to the backend, matching the production
    # topology (backend reachable only through a reverse proxy). Direct
    # localhost:8080 access from the host is no longer available in Docker
    # mode — use `make dev` (services/backend) for that. Publishing this
    # port previously let a client connect directly and bypass the proxy
    # that sets X-Forwarded-For, which made TRUSTED_PROXIES below
    # meaningless (see docs/security-review/DEPLOYMENT-PLAN-2026-07-16.md).
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:?set DB_PASSWORD in .env, see .env.sample}
      - DB_NAME=recipe_db
      - DB_SSL_MODE=disable
      # Trust the whole app_net subnet, not just the frontend's fixed IP.
      # Verified empirically in production (2026-07-18): a request that
      # nginx correctly logs with the real Tailscale client IP arrives at
      # this service claiming the client is 172.30.0.1 — Docker NAT rewrites
      # the source IP of connections into a published port (host nginx ->
      # frontend's 127.0.0.1:3200) to the app_net gateway address, so the
      # frontend's own nginx appends *that* IP to X-Forwarded-For, not host
      # nginx's identity. Trusting only 172.30.0.10 made Gin stop at the
      # untrusted gateway IP and misreport every client as 172.30.0.1.
      # Trusting the subnet lets it walk one entry further left to the real
      # client IP recorded by host nginx. app_net is a private, isolated
      # network joined only by frontend/app/db, so this doesn't extend trust
      # beyond the proxies already implied by the network topology.
      - TRUSTED_PROXIES=172.30.0.0/24
    volumes:
      - ./services/backend:/app
      - ./uploads:/app/uploads
    networks:
      - app_net

  db:
    image: postgres:18-alpine
    # No host port published: the app reaches Postgres over the internal
    # Docker network via DB_HOST=db. Uncomment below only for a one-off local
    # psql session, and bind to loopback so it's never tailnet/internet reachable.
    # ports:
    #   - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:?set DB_PASSWORD in .env, see .env.sample}
      - POSTGRES_DB=recipe_db
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net


networks:
  # Fixed subnet so the frontend's address is known ahead of time and can be
  # trusted explicitly via TRUSTED_PROXIES above, rather than trusting an
  # auto-assigned bridge subnet (which would also mean trusting whatever
  # else joins this network).
  app_net:
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres_data: