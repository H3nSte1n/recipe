services:
  frontend:
    build: ./services/frontend
    ports:
      - "5173:5173"
    depends_on:
      - app
    environment:
      - VITE_ENV=development
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    command: npm run dev

  app:
    build: ./services/backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:?set DB_PASSWORD in .env, see .env.sample}
      - DB_NAME=recipe_db
      - DB_SSL_MODE=disable
    volumes:
      - ./services/backend:/app
      - ./uploads:/app/uploads

  db:
    image: postgres:18-alpine
    # No host port published: the app reaches Postgres over the internal
    # Docker network via DB_HOST=db. Uncomment below only for a one-off local
    # psql session, and bind to loopback so it's never tailnet/internet reachable.
    # ports:
    #   - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:?set DB_PASSWORD in .env, see .env.sample}
      - POSTGRES_DB=recipe_db
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  postgres_data: